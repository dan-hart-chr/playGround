<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Imaginary Designs – Interior Photography Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <main class="hero">

    <div class="hero__content">
      <h1 class="hero__title">Imaginary Designs</h1>
      <p class="hero__subtitle">
        Interior<br>
        Photography Portfolio
      </p>
      <a href="#contact" class="hero__cta">Get in touch</a>

    <div class="hero__media">
      <div class="hero__image-frame">
        <img
          src="https://placehold.co/380x500/9aabb5/f2ece3?text=Photographer"
          alt="A photographer holding a camera to their eye"
          class="hero__image"
          width="380"
          height="500"
        >
      </div>
      <p class="hero__credit">
        Photo by
        <a
          href="https://unsplash.com/@kbecker"
          class="hero__credit-link"
          target="_blank"
          rel="noopener noreferrer"
        >Kim Becker</a>
        on
        <a
          href="https://unsplash.com"
          class="hero__credit-link"
          target="_blank"
          rel="noopener noreferrer"
        >Unsplash</a>
      </p>
    </div>

  </main>

</html>
